<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EthioScholar AI - Your Smart Ethiopian Learning Assistant</title>
    <!-- FontAwesome ለኣይኮኖች -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <!-- Mobile Header -->
    <header class="mobile-header">
        <button id="hamburger-btn"><i class="fas fa-bars"></i></button>
        <div class="mobile-logo">EthioScholar AI</div>
        <button id="theme-toggle-mobile"><i class="fas fa-moon"></i></button>
    </header>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <span class="brand-flag">🇪🇹</span>
                    <div class="brand-text">
                        <h1>EthioScholar AI</h1>
                        <p>Your Smart Learning Assistant</p>
                    </div>
                </div>
            </div>

            <button id="new-chat-btn" class="btn btn-primary"><i class="fas fa-plus"></i> New Chat</button>

            <div class="history-container">
                <div class="section-title">Chat History</div>
                <div id="chat-history-list" class="history-list"></div>
            </div>

            <div class="sidebar-footer">
                <button id="open-settings-btn" class="nav-item"><i class="fas fa-key"></i> <span>Setup API Key</span></button>
                <button id="theme-toggle" class="nav-item"><i class="fas fa-moon"></i> <span>Toggle Theme</span></button>
                <button id="clear-chats-btn" class="nav-item text-danger"><i class="fas fa-trash-alt"></i> <span>Clear Conversations</span></button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-chat">
            <div id="chat-window" class="chat-window">
                <div id="welcome-view" class="welcome-container">
                    <div class="welcome-icon">🇪🇹</div>
                    <h2>እንኳን ደህና መጡ ወደ EthioScholar AI!</h2>
                    <p>Welcome! I am your AI educational assistant dedicated to Ethiopian students.</p>
                </div>
                <div id="message-stream" class="message-stream"></div>
            </div>

            <footer class="input-panel">
                <div class="input-container-wrapper">
                    <div class="control-bar">
                        <span id="char-counter" class="char-counter">0 / 2000 chars</span>
                    </div>
                    <div class="input-row">
                        <textarea id="user-input" rows="1" placeholder="Ask a question..." maxlength="2000"></textarea>
                        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <!-- API Setup Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <span>🔑 API Key Settings</span>
                <button id="close-settings-btn">&times;</button>
            </div>
            <p class="modal-desc">የእርስዎን የ OpenRouter API Key እዚህ ያስገቡ። ቁልፉ በምስጢር ይቀመጣል።</p>
            <div class="modal-body">
                <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
                <button id="save-key-btn">Save API Key</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
